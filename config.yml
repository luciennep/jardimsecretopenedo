backend:
  name: github
  repo: luciennep/jardimsecretopenedo
  branch: main

media_folder: "/"
public_folder: "/"

collections:
  - name: "conteudo"
    label: "Conteúdo do Site"
    files:
      - file: "index.html"
        name: "home"
        label: "Página Principal"
        fields:
          - { label: "Título Principal (Copy)", name: "titulo_principal", widget: "string" }
          - { label: "Texto de Subtítulo", name: "subtitulo_manifesto", widget: "text" }
          - { label: "Link do WhatsApp Principal", name: "link_whatsapp", widget: "string" }
          - { label: "Número do WhatsApp (Texto)", name: "texto_whatsapp", widget: "string" }