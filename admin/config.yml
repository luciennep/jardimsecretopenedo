backend:
  name: github
  repo: luciennep/jardimsecretopenedo
  branch: main
  base_url: https://jardimsecretopenedo.vercel.app/api
  auth_endpoint: auth

media_folder: "."
public_folder: "."
locale: "pt"

collections:
  - name: "conteudo"
    label: "Conteúdo do Site"
    files:
      - name: "dados"
        label: "✏️ Editar Site"
        file: "dados.json"
        format: json
        fields:
          - { label: "Título principal", name: "titulo_principal", widget: "string", required: false }
          - { label: "Subtítulo", name: "subtitulo", widget: "text", required: false }
          - { label: "WhatsApp", name: "link_whatsapp", widget: "string", required: false }
          - { label: "Texto do botão WhatsApp", name: "texto_whatsapp", widget: "string", required: false }
          - { label: "Texto Jardim Secreto", name: "experiencia_lead", widget: "text", required: false }
          - { label: "Nome do Chef", name: "chef_nome", widget: "string", required: false }
          - { label: "Texto do Chef", name: "chef_texto", widget: "text", required: false }
          - { label: "Popup ativo", name: "popup_ativo", widget: "boolean", required: false }
          - { label: "Título do Popup", name: "popup_titulo", widget: "string", required: false }
          - { label: "Texto do Popup", name: "popup_subtitulo", widget: "text", required: false }
          - { label: "Link do Popup", name: "popup_link", widget: "string", required: false }
