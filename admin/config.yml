backend:
  name: github
  repo: luciennep/jardimsecretopenedo
  branch: main
  base_url: https://jardimsecretopenedo.vercel.app
  auth_endpoint: /api/auth

media_folder: "."
public_folder: "."
locale: "pt"

collections:
  - name: "conteudo"
    label: "Conteúdo do Site"
    files:
      - name: "dados"
        label: "✏️ Editar Site"
        file: "dados.json"
        format: json
        fields:
          - { label: "Nome do Restaurante", name: "titulo_principal", widget: "string", required: false }
          - { label: "Frase do Hero", name: "subtitulo", widget: "text", required: false }
          - { label: "Texto do Card Hero", name: "hero_card_texto", widget: "text", required: false }
          - { label: "Botão WhatsApp", name: "hero_botao_whatsapp", widget: "string", required: false }
          - { label: "Botão Conhecer", name: "hero_botao_conhecer", widget: "string", required: false }
          - { label: "Título do Popup", name: "popup_titulo", widget: "string", required: false }
          - { label: "Texto do Popup", name: "popup_subtitulo", widget: "text", required: false }
          - { label: "Botão do Popup", name: "popup_botao", widget: "string", required: false }
          - { label: "Link do Popup", name: "popup_link", widget: "string", required: false }
          - { label: "Título Experiência", name: "experiencia_titulo", widget: "string", required: false }
          - { label: "Texto Experiência", name: "experiencia_lead", widget: "text", required: false }
          - { label: "Texto Localização", name: "localizacao_lead", widget: "text", required: false }
          - { label: "WhatsApp", name: "link_whatsapp", widget: "string", required: false }
