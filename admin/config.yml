backend:
  name: git-gateway
  branch: main
media_folder: "/"
public_folder: "/"
collections:
  - name: "conteudo"
    label: "Conteúdo do Site"
    files:
      - file: "dados.json"
        name: "dados"
        label: "Textos do Site"
        fields:
          - { label: "Título Principal", name: "titulo_principal", widget: "string" }
          - { label: "Subtítulo", name: "subtitulo", widget: "string" }
          - { label: "Título do Manifesto", name: "manifesto_titulo", widget: "string" }
          - { label: "Texto do Manifesto", name: "manifesto_texto", widget: "text" }
          - { label: "Link do WhatsApp", name: "link_whatsapp", widget: "string" }
          - { label: "Texto do Botão WhatsApp", name: "texto_whatsapp", widget: "string" }
          - { label: "Texto Aba Gastronomia", name: "gastronomia_texto", widget: "text" }
          - { label: "Texto Aba O Espaço", name: "espaco_texto", widget: "text" }
          - { label: "Nome do Chef", name: "chef_nome", widget: "string" }
          - { label: "Texto sobre o Chef", name: "chef_texto", widget: "text" }
          - { label: "Legenda Foto 1", name: "foto1_legenda", widget: "string" }
          - { label: "Legenda Foto 2", name: "foto2_legenda", widget: "string" }
          - { label: "Legenda Foto 3", name: "foto3_legenda", widget: "string" }
          - { label: "Legenda Foto 4", name: "foto4_legenda", widget: "string" }
          - { label: "Legenda Foto 5", name: "foto5_legenda", widget: "string" }
          - { label: "Legenda Foto 6", name: "foto6_legenda", widget: "string" }
          - { label: "Legenda Foto 7", name: "foto7_legenda", widget: "string" }
