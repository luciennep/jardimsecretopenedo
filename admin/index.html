<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>Painel Admin — Jardim Secreto</title>
</head>
<body>
  <script>
    // Intercepta postMessage do popup OAuth antes do CMS carregar
    window.addEventListener('message', function(e) {
      console.log('message received', e.data);
    });

    // Sobrescreve window.open para interceptar o popup de auth
    var _open = window.open;
    window.open = function(url, name, features) {
      if (url && url.indexOf('api.netlify.com') !== -1) {
        // Redireciona para nosso relay
        url = 'https://jardimsecretopenedo.vercel.app/api/auth';
      }
      return _open.call(window, url, name, features);
    };
  </script>
  <script src="https://unpkg.com/netlify-cms@^2.10.192/dist/netlify-cms.js"></script>
</body>
</html>
